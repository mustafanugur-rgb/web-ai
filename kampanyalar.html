  <div class="admin-main">
    <header class="admin-header">
      <h1 class="admin-title">Kampanyalar</h1>
      <div class="admin-header-actions">
        <div id="lang-selector"></div>
        <span class="admin-user"></span>
        <button type="button" class="btn btn-primary btn-sm" id="btn-add-campaign">+ Yeni Kampanya</button>
      </div>
    </header>

    <main id="main-content" class="admin-content">
      <section class="widget-section">
        <div class="campaign-grid" id="campaigns-grid">
          <!-- JS ile doldurulacak -->
        </div>
        <div id="campaigns-empty" class="table-empty" style="display:none;">
          <div class="table-empty-icon">📢</div>
          <p>Henüz kampanya yok.</p>
          <button type="button" class="btn btn-primary" id="btn-add-campaign-empty">+ İlk Kampanyayı Oluştur</button>
        </div>
      </section>
    </main>
  </div>

  <div class="modal-overlay" id="campaign-modal" aria-hidden="true">
    <div class="modal" role="dialog" aria-labelledby="campaign-modal-title" aria-modal="true">
      <div class="modal-header">
        <h2 id="campaign-modal-title">Yeni Kampanya</h2>
        <button type="button" class="modal-close" id="campaign-modal-close" aria-label="Kapat">&times;</button>
      </div>
      <form id="campaign-form" class="modal-body">
        <input type="hidden" id="campaign-id" name="id">
        <div class="form-group">
          <label for="campaign-name">Kampanya adı *</label>
          <input type="text" id="campaign-name" name="name" class="input" required maxlength="120" autocomplete="off">
        </div>
        <div class="form-group">
          <label for="campaign-status">Durum</label>
          <select id="campaign-status" name="status" class="input">
            <option value="active">Aktif</option>
            <option value="new">Yeni</option>
            <option value="passive">Pasif</option>
          </select>
        </div>
        <div class="form-row-2">
          <div class="form-group">
            <label for="campaign-revenue">Gelir (₺)</label>
            <input type="number" id="campaign-revenue" name="revenue" class="input" min="0" step="1" value="0">
          </div>
          <div class="form-group">
            <label for="campaign-spend">Harcama (₺)</label>
            <input type="number" id="campaign-spend" name="spend" class="input" min="0" step="1" value="0">
          </div>
        </div>
        <p class="stat-meta" style="margin-top:0;">ROI = Gelir ÷ Harcama (panel takibi için manuel girilir).</p>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" id="campaign-modal-cancel">İptal</button>
          <button type="submit" class="btn btn-primary">Kaydet</button>
        </div>
      </form>
    </div>
  </div>

  <script src="js/config.js" defer></script>
  <script src="js/translations.js" defer></script>
  <script src="js/i18n.js" defer></script>
  <script src="js/theme.js" defer></script>
  <script src="js/admin-sidebar.js" defer></script>
  <script src="js/admin-notifications.js" defer></script>
  <script src="js/kampanyalar-admin.js" defer></script>
