<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="robots" content="noindex,follow">
  <title>Ödeme Başarılı | Dinamik POS E-ticaret</title>
  <link rel="canonical" href="http://wwww.dinamikpos.com.tr.tr/odeme-basarili.html">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/theme-toggle.css">
  <link rel="stylesheet" href="css/nav.css">
  <script>document.documentElement.setAttribute('data-theme',localStorage.getItem('dinamik_theme')||'light');</script>
  <script>document.documentElement.setAttribute('lang',localStorage.getItem('dinamik_lang')||'tr');</script>
  <style>
    .success-page { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem; padding-top: 5rem; }
    .success-card { max-width: 480px; text-align: center; }
    .success-icon { font-size: 4rem; margin-bottom: 1rem; }
    .success-card h1 { font-size: 1.5rem; margin-bottom: 0.5rem; }
    .success-card p { color: var(--color-text-secondary); margin-bottom: 1.5rem; }
  </style>
</head>
<body>
  <header class="header" role="banner">
    <nav class="nav" aria-label="Ana menü">
      <a href="index.html" class="nav-logo"><img src="images/logo.png" alt="Dinamik POS" class="nav-logo-img" width="180" height="45" loading="lazy" decoding="async"></a>
      <button type="button" class="nav-toggle" id="nav-toggle" aria-expanded="false" aria-controls="nav-menu" aria-label="Menüyü aç/kapat">
        <span class="nav-toggle-bar"></span>
        <span class="nav-toggle-bar"></span>
        <span class="nav-toggle-bar"></span>
      </button>
      <div class="nav-menu" id="nav-menu">
        <div class="nav-cta">
          <div id="lang-selector"></div>
          <div class="theme-toggle" role="group" aria-label="Tema seçimi">
            <button type="button" data-theme-toggle="dark" aria-pressed="true" title="Koyu tema"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg></button>
            <button type="button" data-theme-toggle="light" aria-pressed="false" title="Açık tema"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg></button>
          </div>
          <a href="index.html" class="btn btn-secondary" data-i18n="nav_home">Ana Sayfa</a>
          <a href="admin.html" class="btn btn-primary" data-i18n="go_panel">Panele Git</a>
        </div>
      </div>
    </nav>
  </header>
  <div class="success-page">
    <div class="success-card card">
      <div class="success-icon">✓</div>
      <h1 data-i18n="payment_success">Ödeme Başarılı</h1>
      <p data-i18n="payment_success_msg">Aboneliğiniz aktif edildi. En kısa sürede sizinle iletişime geçeceğiz.</p>
      <a href="admin.html" class="btn btn-primary" data-i18n="go_panel">Panele Git</a>
      <a href="index.html" class="btn btn-secondary" style="margin-left:0.5rem;" data-i18n="nav_home">Ana Sayfa</a>
    </div>
  </div>
  <script src="js/config.js" defer></script>
  <script src="js/translations.js" defer></script>
  <script src="js/i18n.js" defer></script>
  <script src="js/theme.js" defer></script>
  <script src="js/nav-mobile.js" defer></script>
  <script>
    (function() {
      var params = new URLSearchParams(window.location.search);
      var oid = params.get('oid');
      if (oid) {
        try {
          var pending = sessionStorage.getItem('dinamik_pending_order');
          var orders = JSON.parse(localStorage.getItem('dinamik_orders') || '[]');
          var order = pending ? JSON.parse(pending) : { id: oid, customer: '-', total: 0, status: 'paid', date: new Date().toISOString() };
          order.id = oid;
          order.status = 'paid';
          order.date = order.date || new Date().toISOString();
          orders.push(order);
          localStorage.setItem('dinamik_orders', JSON.stringify(orders));
          sessionStorage.removeItem('dinamik_pending_order');
        } catch (e) {}
      }
    })();
  </script>
</body>
</html>
